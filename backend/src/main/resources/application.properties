# Server Configurations
server.port=9095

# Automata Engine Config
automata.use-mock-ai=${USE_MOCK_AI:false}
automata.gemini-api-key=${GEMINI_API_KEY:}
automata.groq-api-key=${GROQ_API_KEY:}

# GitHub Configuration
automata.github-token=${GITHUB_TOKEN:}
automata.github-owner=${GITHUB_OWNER:}
automata.github-repo=${GITHUB_REPO:}
automata.github-default-branch=${GITHUB_DEFAULT_BRANCH:main}

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.automata=INFO

# Webhook Security Configuration
automata.webhook.github-secret=${GITHUB_WEBHOOK_SECRET:}
automata.webhook.jira-secret=${JIRA_WEBHOOK_SECRET:}

# ─────────────────────────────────────────────────────────────────────────────
# Compiler-in-the-Loop: Self-Healing Sandbox Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Enable/disable Gate 2 compiler validation (set false to keep brace-only checks)
automata.compiler.enabled=${AUTOMATA_COMPILER_ENABLED:true}

# Max seconds to wait for the compiler process before forcibly killing it
automata.compiler.timeout-seconds=${AUTOMATA_COMPILER_TIMEOUT:60}

# Set to true to run full test suite (mvn test) instead of just mvn compile.
# WARNING: adds 30-90s per healing attempt. Keep false for fast feedback loops.
automata.compiler.run-tests=${AUTOMATA_COMPILER_RUN_TESTS:false}

# Absolute path to the project root containing pom.xml or package.json.
# Leave blank to auto-detect from the Spring Boot working directory.
automata.compiler.project-root=${AUTOMATA_COMPILER_PROJECT_ROOT:}

